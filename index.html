<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Lessons</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Donuts!</h1>

    <form id="donut-form">
      <hr />
      <label>
        Order a Donut
        <select name="type">
          <option value="glazed">Glazed Donut</option>
          <option value="jelly">Jelly Donut</option>
          <option value="boston">Boston Cream</option>
          <option  value="KAITO"> KAITO</option>
        </select>
      </label>
      <button type="submit">Order</button>
    </form>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      var donutImages = {
        glazed: "https://daylightdonutsstgeorge.com/wp-content/uploads/2023/06/Raised-Glazed.jpg",
        jelly: "https://static01.nyt.com/images/2014/12/14/magazine/14eat4/14eat4-superJumbo.jpg",
        boston: "https://i0.wp.com/www.onegreenplanet.org/wp-content/uploads/2020/03/screen-shot-2020-03-30-at-12-35-21-pm.png?fit=763%2C657&ssl=1",
        KAITO: "https://static.wikia.nocookie.net/piapro-studio/images/3/3a/KAITO_V3.png/revision/latest/scale-to-width/360?cb=20190902191605"
      };

      $("#donut-form").on("submit", function (event) {
        event.preventDefault();

        var $donutType = $(this).find("[name=type]");
        var donutType = $donutType.val();

        var $img = $("<img>");
        $img.width(100);
        $img.attr("src", donutImages[donutType]);
        $img.appendTo("#donut-form");

      });
    </script>

    <h1>
      KAITO LOVES DONUTS
    </h1>
    <p>
      proof below
    </p>

    <iframe 
      data-testid="embed-iframe" 
      style="border-radius:12px" 
      src="https://open.spotify.com/embed/album/31rSoOGI6hH7Fj6A8hRH3x?utm_source=generator" 
      width="100%" 
      height="352" 
      frameBorder="0" 
      allowfullscreen="" 
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
      loading="lazy">
    </iframe>

  </body>
</html>
